# E2E test config (HTTPS) with file backend. Use when E2E_REGISTRY_URL=https://127.0.0.1:8082.
# No Nexus required. Requires certs (make test-e2e-generate-certs).
server:
  hostname: 127.0.0.1
  port: 8082
  listPageSize: 1  # E2E: paginate with 1 per page to test Link headers (first, prev, next, last)
  tlsEnabled: true
  certs:
    cert: testdata/e2e/certs/server.crt
    key: testdata/e2e/certs/server.key
  repo:
    type: file
    path: e2e-file-repo
  publish:
    maxSize: 204800
  auth:
    enabled: true
    type: basic
    users:
      - username: admin
        password: 240be518fabd2724ddb6f04eeb1da5967448d7e831c08c8fa822809f74c720a9  # sha256 of admin123
  packageCollections:
    enabled: true
    requirePackageJson: false
