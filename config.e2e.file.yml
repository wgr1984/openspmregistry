# E2E test config (HTTP) with file backend. No Nexus required.
server:
  hostname: 127.0.0.1
  port: 8082
  listPageSize: 1  # E2E: paginate with 1 per page to test Link headers (first, prev, next, last)
  tlsEnabled: false
  certs:
    cert: server.crt
    key: server.key
  repo:
    type: file
    path: e2e-file-repo
  publish:
    maxSize: 204800
  auth:
    enabled: false
  packageCollections:
    enabled: true
    requirePackageJson: false
